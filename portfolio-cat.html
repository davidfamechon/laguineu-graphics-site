    <script type="text/javascript">
        jQuery(document).ready(function($) {
            
            // Détection de la taille de l'écran (Mobile vs Bureau)
            // Si l'écran fait 768px ou moins (tablette/mobile), on limite à 2 images. Sinon, 9.
            var limiteImages = $(window).width() <= 768 ? 2 : 9;

            // 1. Préparation des effets d'apparition (Hybride & Responsive)
            $('.portfolio_item').each(function(index) {
                
                // --- LES IMAGES DU HAUT (Fade-in au chargement) ---
                if (index < limiteImages) {
                    var $el = $(this);
                    
                    // On définit une opacité à 0 et une transition plus longue (1.5 seconde)
                    $el.css({'opacity': '0', 'transition': 'opacity 1500ms ease-in-out'});
                    
                    // L'ASTUCE DU REFLOW : On demande au navigateur de mesurer l'élément. 
                    // Cela l'oblige à appliquer l'opacité 0 avant de passer à la suite !
                    $el[0].offsetHeight; 
                    
                    // Déclenchement du fondu avec un vrai effet domino
                    // 300ms de pause au départ, puis +200ms d'attente par image supplémentaire
                    setTimeout(function() {
                        $el.css('opacity', '1');
                    }, 300 + (index * 200));
                } 
                // --- LE RESTE DES IMAGES (Slide-up au défilement) ---
                else {
                    $(this).css({'opacity': '0', 'transition': 'all 800ms ease'});
                    $(this).addClass('lazy-load-box trigger effect-slideup');
                    $(this).attr('data-delay', (index % 3) * 150); 
                }

                // 2. Agrandissement des images (Magnific Popup)
                $(this).magnificPopup({
                    delegate: 'a[rel^="prettyPhoto"]', 
                    type: 'image',
                    gallery: { enabled: true, navigateByImgClick: true, preload: [0,1], tCounter: '%curr% / %total%' }
                });
            });

            // 3. Initialisation du menu
            $('ul.sf-menu').superfish({
                delay: 1000,
                animation: { opacity: "show", height: "show" },
                speed: "normal",
                autoArrows: false,
                disableHI: true
            });
            $('.header-wrap').tmStickUp({ active: true, pseudo: false });

            // 4. Déclenchement du scroll pour détecter les éléments plus bas
            setTimeout(function() { 
                $(window).trigger('scroll'); 
            }, 200);
        });
    </script>

<script type="text/javascript">
	jQuery(document).ready(function($) {
		$(window).scroll(function () {
			// Si on descend de plus de 400 pixels
			if ($(this).scrollTop() > 400) {
				$('#back-top-wrapper').addClass('is-visible'); 
			} else {
				$('#back-top-wrapper').removeClass('is-visible'); 
			}
		});
	});
